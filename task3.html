<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#dfe3ea;
}
.mobile{
    width:350px;
    background:white;
    border-radius:35px;
    padding:30px 25px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.status{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
    font-size:22px;
    font-weight:bold;
}
h1{
    text-align:center;
    margin-bottom:50px;
    font-size:22px;
}
.row{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin-bottom:35px;
}
.box{
    flex:1;
}
label{
    display:block;
    color:gray;
    margin-bottom:15px;
    font-size:18px;
}
input, select{
    width:100%;
    border:none;
    border-bottom:2px solid #ddd;
    padding:10px 0;
    font-size:22px;
    outline:none;
    background:none;
}
.result{
    margin-bottom:50px;
}
.result-value{
    font-size:24px;
    border-bottom:2px solid #ddd;
    padding-bottom:15px;
}
button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:#1677f2;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0f5fd1;
}

</style>
</head>

<body>

<div class="mobile">

    <!-- Status Bar -->
    <div class="status">
        <span id="time">9:41</span>
        <span>📶 📡 🔋</span>
    </div>

    <!-- Heading -->
    <h1>Temperature converter</h1>

    <!-- Input Section -->
    <div class="row">

        <div class="box">
            <label>Degrees</label>
            <input type="number" id="degree" value="72">
        </div>

        <div class="box">
            <label>Type</label>

            <select id="type">
                <option>Fahrenheit</option>
                <option>Celsius</option>
            </select>
        </div>

    </div>

    <!-- Result -->
    <div class="result">

        <label>Result</label>

        <div class="result-value" id="result">
            22.2222 °C
        </div>

    </div>

    <!-- Button -->
    <button onclick="convertTemp()">
        Convert
    </button>

</div>

<script>

/* Current Time */

function updateTime(){

    let now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();

    minutes = minutes < 10 ? "0" + minutes : minutes;

    let currentTime = hours + ":" + minutes;

    document.getElementById("time").innerHTML =
    currentTime;
}

updateTime();

setInterval(updateTime, 1000);

/* Temperature Converter */

function convertTemp(){

    let degree =
    document.getElementById("degree").value;

    let type =
    document.getElementById("type").value;

    let result;

    if(type === "Fahrenheit"){

        result = (degree - 32) * 5/9;

        document.getElementById("result")
        .innerHTML =
        result.toFixed(4) + " °C";
    }

    else{

        result = (degree * 9/5) + 32;

        document.getElementById("result")
        .innerHTML =
        result.toFixed(4) + " °F";
    }

}

</script>

</body>
</html>
